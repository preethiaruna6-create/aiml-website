<!DOCTYPE html>
<html>
<head>
    <title>Users Data</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#0f2027;
            color:white;
            text-align:center;
        }

        h1{
            color:#00ffcc;
            margin-top:20px;
        }

        table{
            margin:auto;
            border-collapse:collapse;
            width:90%;
            background:white;
            color:black;
        }

        th,td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }

        th{
            background:#00bcd4;
            color:white;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#00bcd4;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<h1>Users Details</h1>

<table>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Message</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/">Back to Home</a>

</body>
</html>

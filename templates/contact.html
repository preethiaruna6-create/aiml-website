<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            color:white;
            background:url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1600&q=80");
            background-size:cover;
            background-position:center;
            background-attachment:fixed;
        }

        .overlay{
            background:rgba(0,0,0,0.75);
            min-height:100vh;
            padding:40px;
            text-align:center;
        }

        h1{
            color:#00ffcc;
            font-size:50px;
            text-shadow:0 0 15px cyan;
        }

        .box{
            width:450px;
            margin:auto;
            background:white;
            color:black;
            padding:25px;
            border-radius:15px;
            box-shadow:0 0 20px cyan;
        }

        input,textarea{
            width:90%;
            padding:10px;
            margin:10px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            background:#00bcd4;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0097a7;
        }

        a{
            display:inline-block;
            margin-top:30px;
            background:#00bcd4;
            color:white;
            padding:10px 20px;
            text-decoration:none;
            border-radius:8px;
        }

        a:hover{
            background:#0097a7;
        }
    </style>

</head>

<body>

<div class="overlay">

<h1>📞 Contact Us</h1>

<div class="box">

<form action="/submit" method="POST">

<input type="text" name="name" placeholder="Enter Your Name" required>

<input type="email" name="email" placeholder="Enter Your Email" required>

<textarea name="message" rows="5" placeholder="Enter Your Message"></textarea>

<br><br>

<button type="submit">Send Message</button>

</form>

</div>

<a href="/">⬅ Back to Home</a>

</div>

</body>
</html>
